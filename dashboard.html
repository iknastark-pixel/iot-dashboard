<!DOCTYPE html>

<html>
<head>
<title>IoT Environment Monitor</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>

<body>

<h2>Environment Monitoring Dashboard</h2>

<h3>Select topics to monitor:</h3>

<label>
<input type="checkbox" id="tempCheck"> Temperature
</label>
<br>

<label>
<input type="checkbox" id="humCheck"> Humidity
</label>
<br>

<label>
<input type="checkbox" id="airCheck"> Air Quality
</label>

<h3>Live Data</h3>

<p>Temperature: <span id="temp">--</span></p>
<p>Humidity: <span id="hum">--</span></p>
<p>Air Quality: <span id="air">--</span></p>

<script>

const clientId = "dashboard_" + Math.random().toString(16).substr(2,8);

const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt", {
    clientId: clientId
});

client.on("connect", function () {
    console.log("Connected to MQTT");
});

document.getElementById("tempCheck").addEventListener("change", function() {
    if(this.checked){
        client.subscribe("iot/env/temperature");
    } else {
        client.unsubscribe("iot/env/temperature");
    }
});

document.getElementById("humCheck").addEventListener("change", function() {
    if(this.checked){
        client.subscribe("iot/env/humidity");
    } else {
        client.unsubscribe("iot/env/humidity");
    }
});

document.getElementById("airCheck").addEventListener("change", function() {
    if(this.checked){
        client.subscribe("iot/env/air");
    } else {
        client.unsubscribe("iot/env/air");
    }
});

client.on("message", function(topic, message){

    const value = message.toString();

    if(topic === "iot/env/temperature"){
        document.getElementById("temp").innerText = value + " °C";
    }

    if(topic === "iot/env/humidity"){
        document.getElementById("hum").innerText = value + " %";
    }

    if(topic === "iot/env/air"){
        document.getElementById("air").innerText = value;
    }

});

</script>

</body>
</html>
